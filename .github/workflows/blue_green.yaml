name: 'Terraform Blue-Green Deployment'

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TF_ACTION_WORKING_DIR: 'lesson-4-demos/terraform-demo'


jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_ACTION_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_ACTION_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_ACTION_WORKING_DIR }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: ${{ env.TF_ACTION_WORKING_DIR }}
        run: terraform apply -auto-approve

      - name: Determine active environment
        id: active-env
        run: |
          echo "Pseudo-code:"
          echo "1. Query the load balancer / target group / DNS record"
          echo "2. Detect whether Blue or Green is currently receiving traffic"
          echo "3. Store the result for later steps"
          echo "active_environment=blue" >> $GITHUB_OUTPUT

      - name: Verify Green environment is healthy before switch
        if: steps.active-env.outputs.active_environment == 'blue'
        run: |
          echo "Pseudo-code:"
          echo "1. Check Green deployment health"
          echo "2. Confirm instances/containers are passing health checks"
          echo "3. If healthy, continue"
          echo "4. If unhealthy, fail the workflow"

      - name: Switch traffic from Blue to Green
        if: steps.active-env.outputs.active_environment == 'blue'
        run: |
          echo "Pseudo-code:"
          echo "1. Update load balancer listener / routing rule"
          echo "2. Point production traffic to Green"
          echo "3. Monitor for errors after cutover"

      - name: Verify Blue environment is healthy before switch
        if: steps.active-env.outputs.active_environment == 'green'
        run: |
          echo "Pseudo-code:"
          echo "1. Check Blue deployment health"
          echo "2. Confirm instances/containers are passing health checks"
          echo "3. If healthy, continue"
          echo "4. If unhealthy, fail the workflow"

      - name: Switch traffic from Green to Blue
        if: steps.active-env.outputs.active_environment == 'green'
        run: |
          echo "Pseudo-code:"
          echo "1. Update load balancer listener / routing rule"
          echo "2. Point production traffic to Blue"
          echo "3. Monitor for errors after cutover"
